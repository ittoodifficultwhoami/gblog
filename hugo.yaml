baseURL: https://minweb.shop/
title: MinWeb
theme: PaperMod

defaultContentLanguage: en
defaultContentLanguageInSubdir: true

languages:
  en:
    languageCode: en-us
    languageName: English
    weight: 1
    contentDir: content/en
    params:
      description: "Practical guides backed by real data"
      homeInfoParams:
        Title: "MinWeb"
        Content: "Practical guides backed by real data"
    menu:
      main:
        - identifier: search
          name: Search
          url: /en/search/
          weight: 10
        - identifier: categories
          name: Categories
          url: /en/categories/
          weight: 20
        - identifier: tags
          name: Tags
          url: /en/tags/
          weight: 30
  kr:
    languageCode: ko-kr
    languageName: 한국어
    weight: 2
    contentDir: content/kr
    params:
      description: "데이터 기반 실용 가이드"
      homeInfoParams:
        Title: "MinWeb"
        Content: "데이터 기반 실용 가이드"
    menu:
      main:
        - identifier: search
          name: 검색
          url: /kr/search/
          weight: 10
        - identifier: categories
          name: 카테고리
          url: /kr/categories/
          weight: 20
        - identifier: tags
          name: 태그
          url: /kr/tags/
          weight: 30
  ch:
    languageCode: zh-cn
    languageName: 中文
    weight: 3
    contentDir: content/ch
    params:
      description: "基于数据的实用指南"
      homeInfoParams:
        Title: "MinWeb"
        Content: "基于数据的实用指南"
    menu:
      main:
        - identifier: search
          name: 搜索
          url: /ch/search/
          weight: 10
        - identifier: categories
          name: 分类
          url: /ch/categories/
          weight: 20
        - identifier: tags
          name: 标签
          url: /ch/tags/
          weight: 30

pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  author: "MinWeb"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false

  socialIcons:
    - name: rss
      url: /index.xml

  assets:
    favicon: /favicon.ico

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  ShowLanguageSwitcher: false
