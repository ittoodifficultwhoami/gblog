    menu:
      main:
        - identifier: cat-finance
          name: 経済
          url: /jp/categories/finance/
          weight: 10
        - identifier: cat-tech
          name: テクノロジー
          url: /jp/categories/tech/
          weight: 20
        - identifier: cat-health
          name: 健康
          url: /jp/categories/health/
          weight: 30
        - identifier: cat-entertainment
          name: エンタメ
          url: /jp/categories/entertainment/
          weight: 40
        - identifier: cat-politics
          name: 政治
          url: /jp/categories/politics/
          weight: 50
        - identifier: cat-lifestyle
          name: ライフ
          url: /jp/categories/lifestyle/
          weight: 60
        - identifier: search
          name: 検索
          url: /jp/search/
          weight: 70
  de:
    languageCode: de-DE
    languageName: Deutsch
    weight: 3
    contentDir: content/de
    params:
      description: "Datenbasierte Praxisratgeber"
      homeInfoParams:
        Title: "MinWeb"
        Content: "Datenbasierte Praxisratgeber"
    menu:
      main:
        - identifier: cat-finance
          name: Finanzen
          url: /de/categories/finance/
          weight: 10
        - identifier: cat-tech
          name: Technik
          url: /de/categories/tech/
          weight: 20
        - identifier: cat-health
          name: Gesundheit
          url: /de/categories/health/
          weight: 30
        - identifier: cat-entertainment
          name: Unterhaltung
          url: /de/categories/entertainment/
          weight: 40
        - identifier: cat-politics
          name: Politik
          url: /de/categories/politics/
          weight: 50
        - identifier: cat-sports
          name: Sport
          url: /de/categories/sport/
          weight: 60
        - identifier: cat-lifestyle
          name: Lifestyle
          url: /de/categories/lifestyle/
          weight: 70
        - identifier: search
          name: Suche
          url: /de/search/
          weight: 80

pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  author: "MinWeb"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false

  socialIcons:
    - name: rss
      url: /index.xml

  assets:
    favicon: /favicon.ico

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  disableLangToggle: true
