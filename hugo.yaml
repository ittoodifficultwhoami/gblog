    params:
      description: "Practical guides backed by real data"
      homeInfoParams:
        Title: "MinWeb"
        Content: "Practical guides backed by real data"
    menu:
      main:
        - identifier: cat-finance
          name: Finance
          url: /en/categories/finance/
          weight: 10
        - identifier: cat-tech
          name: Tech
          url: /en/categories/tech/
          weight: 20
        - identifier: cat-health
          name: Health
          url: /en/categories/health/
          weight: 30
        - identifier: cat-entertainment
          name: Entertainment
          url: /en/categories/entertainment/
          weight: 40
        - identifier: cat-politics
          name: Politics
          url: /en/categories/politics/
          weight: 50
        - identifier: cat-sports
          name: Sports
          url: /en/categories/sports/
          weight: 60
        - identifier: cat-lifestyle
          name: Lifestyle
          url: /en/categories/lifestyle/
          weight: 70
        - identifier: search
          name: Search
          url: /en/search/
          weight: 80
  jp:
